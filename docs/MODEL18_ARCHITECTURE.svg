<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520">
  <rect width="1280" height="520" fill="#ffffff"/>
  <style>
    .box { fill:#f7f9fb; stroke:#1f2937; stroke-width:1.5; rx:8; }
    .core { fill:#e8f1ff; stroke:#1d4ed8; stroke-width:2; rx:8; }
    .out { fill:#eef8f0; stroke:#15803d; stroke-width:1.5; rx:8; }
    .txt { font-family:Arial, sans-serif; font-size:18px; fill:#111827; }
    .small { font-family:Arial, sans-serif; font-size:14px; fill:#374151; }
    .arrow { stroke:#374151; stroke-width:2; marker-end:url(#arrow); }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#374151"/></marker></defs>
  <text x="40" y="45" class="txt" style="font-size:26px;font-weight:bold">model18 Modular PolyQ Dynamic DSSP to 3D Ensemble</text>
  <rect x="40" y="90" width="170" height="90" class="box"/><text x="62" y="122" class="txt">Data Sampler</text><text x="62" y="150" class="small">MD/SMD frames</text><text x="62" y="170" class="small">Q length filter</text>
  <rect x="260" y="90" width="190" height="90" class="core"/><text x="282" y="122" class="txt">DSSP Classifier</text><text x="282" y="150" class="small">model12 main</text><text x="282" y="170" class="small">model16 calibration</text>
  <rect x="500" y="90" width="190" height="90" class="box"/><text x="522" y="122" class="txt">DSSP Sampler</text><text x="522" y="150" class="small">sample N SS8 states</text><text x="522" y="170" class="small">consensus profile</text>
  <rect x="740" y="90" width="190" height="90" class="box"/><text x="762" y="122" class="txt">Frame Retrieval</text><text x="762" y="150" class="small">MD/SMD library</text><text x="762" y="170" class="small">length-matched frames</text>
  <rect x="980" y="90" width="210" height="90" class="box"/><text x="1002" y="122" class="txt">Ranking</text><text x="1002" y="150" class="small">DSSP + Rg + E2E</text><text x="1002" y="170" class="small">contact score</text>
  <line x1="210" y1="135" x2="260" y2="135" class="arrow"/><line x1="450" y1="135" x2="500" y2="135" class="arrow"/><line x1="690" y1="135" x2="740" y2="135" class="arrow"/><line x1="930" y1="135" x2="980" y2="135" class="arrow"/>
  <rect x="175" y="270" width="230" height="100" class="out"/><text x="198" y="303" class="txt">PDB Ensemble</text><text x="198" y="332" class="small">top-k real trajectory frames</text><text x="198" y="352" class="small">PyMOL compatible</text>
  <rect x="525" y="270" width="230" height="100" class="out"/><text x="548" y="303" class="txt">3D Cartoon</text><text x="548" y="332" class="small">DSSP-colored backbone</text><text x="548" y="352" class="small">paper-ready PNG</text>
  <rect x="875" y="270" width="230" height="100" class="out"/><text x="898" y="303" class="txt">Analysis Tables</text><text x="898" y="332" class="small">probabilities, frequency</text><text x="898" y="352" class="small">ranked conformer scores</text>
  <line x1="1085" y1="180" x2="290" y2="270" class="arrow"/><line x1="1085" y1="180" x2="640" y2="270" class="arrow"/><line x1="1085" y1="180" x2="990" y2="270" class="arrow"/>
  <text x="40" y="460" class="small">Scientific boundary: DSSP + length is underdetermined for IDPs. model18 retrieves traceable MD/SMD conformers instead of claiming a unique fold.</text>
</svg>
